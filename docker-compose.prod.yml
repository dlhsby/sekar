# SEKAR — Production stack (self-hosted, single host)
#
# Brings up the full application on one machine: PostgreSQL + Redis + MinIO
# (S3-compatible object storage) + backend API + web dashboard + Nginx (TLS
# reverse proxy). For a managed-cloud layout (RDS / ElastiCache / real S3) see
# the AWS appendix in specs/deployment/deployment-guide.md and use external
# endpoints instead of the postgres/redis/minio services here.
#
# Usage:
#   cp .env.production.example .env.production   # fill in real secrets
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#   docker compose --env-file .env.production -f docker-compose.prod.yml exec backend npm run migration:run
#
# All secrets come from .env.production (gitignored). Never bake them into images.

services:
  postgres:
    image: postgres:14-alpine
    container_name: sekar-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:?set DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-sekar_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sekar-prod]
    # Not published to the host — only reachable inside the compose network.

  redis:
    image: redis:7-alpine
    container_name: sekar-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [sekar-prod]

  # S3-compatible object storage for media. Swap for real AWS S3 by leaving
  # these out and pointing the backend's AWS_* vars at the real bucket.
  minio:
    image: minio/minio:latest
    container_name: sekar-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [sekar-prod]

  # One-shot: create the media bucket on first boot, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$AWS_ACCESS_KEY_ID\" \"$AWS_SECRET_ACCESS_KEY\" &&
      mc mb --ignore-existing local/\"$AWS_S3_BUCKET\" &&
      echo 'bucket ready: '\"$AWS_S3_BUCKET\"
      "
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-sekar-media}
    networks: [sekar-prod]

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile        # final stage (runner) builds by default
    image: sekar-backend:prod
    container_name: sekar-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Network-internal overrides win over the file so service names resolve.
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      # env_file injects the ENCRYPTED .env.production values; load-env.ts decrypts
      # them at boot using this key (passed through from the deploy environment).
      DOTENV_PRIVATE_KEY_PRODUCTION: ${DOTENV_PRIVATE_KEY_PRODUCTION:?set DOTENV_PRIVATE_KEY_PRODUCTION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [sekar-prod]

  web:
    build:
      context: ./fe/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* (incl. the Google Maps key) are decrypted from the committed
      # encrypted fe/web/.env.production by dotenvx during the build (no plaintext build args).
      args:
        DOTENV_ENV: production
      secrets:
        - dotenv_private_key
    image: sekar-web:prod
    container_name: sekar-web-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks: [sekar-prod]

  # Public user manual (Docusaurus static site). Pure static HTML served by the
  # image's bundled nginx — no env, no DB, no secrets. Fronted by the edge nginx
  # below at docs.<your-domain>. Site identity is baked at build time; override
  # the example.com placeholders to your real domain.
  docs:
    build:
      context: ./fe/docs
      dockerfile: Dockerfile
      args:
        DOCS_URL: https://docs.sekar.example.com
        DOCS_BASE_URL: /
        APP_URL: https://sekar.example.com
    image: sekar-docs:prod
    container_name: sekar-docs-prod
    restart: unless-stopped
    networks: [sekar-prod]

  nginx:
    image: nginx:1.27-alpine
    container_name: sekar-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro      # put fullchain.pem + privkey.pem here
      - certbot-webroot:/var/www/certbot:ro    # ACME http-01 challenge files
    depends_on:
      - backend
      - web
      - docs
    networks: [sekar-prod]

networks:
  sekar-prod:
    driver: bridge

# BuildKit secret for the web image build — dotenvx reads the private key from the
# deploy environment (set by `dotenvx run` / the operator) to decrypt .env.production.
secrets:
  dotenv_private_key:
    environment: DOTENV_PRIVATE_KEY_PRODUCTION

volumes:
  postgres-data:
  redis-data:
  minio-data:
  certbot-webroot:
