# SEKAR Backend - Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
# - Create .env.production file with all required environment variables
# - Ensure RDS endpoint is accessible from EC2
# - Ensure S3 bucket exists and IAM credentials have access

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sekar-backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.9'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

# Note: Database is external (AWS RDS)
# S3 is used for media storage
# No local volumes needed for production

networks:
  default:
    driver: bridge
