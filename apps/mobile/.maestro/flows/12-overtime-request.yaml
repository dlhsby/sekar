appId: com.wahyutrip.sekar
---
# 12-overtime-request.yaml
# Overtime request flow — satgas starts and submits overtime after shift ends
# Scenario: satgas navigates to overtime section, starts overtime, works, then submits

- launchApp
- assertVisible:
    id: username-input

# Login as satgas1
- tapOn:
    id: username-input
- inputText: satgas1

- tapOn:
    id: password-input
- inputText: 12345678

- tapOn:
    id: login-button

- wait: 2000

# Navigate to home and find overtime option
# Overtime is typically in a drawer/menu or a dedicated tab
# For this test, we navigate via menu or search for "Lembur"
- scroll:
    direction: down
    duration: 500

- wait: 500

# Try to find overtime in nav (may be in a drawer or bottom tabs)
- tryTapOn:
    text: Lembur|Overtime|Overtime Request

- wait: 1000

# If not found, try opening a menu
- tryTapOn:
    text: Menu|☰|More

- wait: 500

- tryTapOn:
    text: Lembur

- wait: 1000

# Should be at OvertimeListScreen
- assertVisible:
    text: Lembur|Overtime

# Look for a button to start or request overtime
- tryTapOn:
    text: Mulai Lembur|Start Overtime|Buat|Add

- wait: 1000

# Should navigate to OvertimeDetailScreen or OvertimeSubmitScreen
- assertVisible:
    text: Lembur|Overtime|Mulai

# Start overtime (if not already started)
- tryTapOn:
    text: Mulai|Start|Begin

- wait: 1000

# May show a form or confirmation
- tryTapOn:
    text: Konfirmasi|Ya|Lanjut

- wait: 1000

# Overtime should now be running (timer visible)
- assertVisible:
    text: Waktu|Timer|Lembur Berjalan

- wait: 2000

# Now submit overtime with optional notes
- scroll:
    direction: down
    duration: 500

- wait: 500

# Look for submit button
- tryTapOn:
    text: Kirim|Submit|Selesai Lembur

- wait: 500

# May see a form for overtime details (activity type, notes)
- tryTapOn:
    text: Aktivitas|Catatan|Notes

- wait: 300

- inputText: Lembur untuk menyelesaikan patroli area

# Submit
- tryTapOn:
    text: Kirim|Submit|Simpan

- wait: 2000

# Should show success
- assertVisible:
    text: Berhasil|Sukses|Lembur tersimpan

# MANUAL: On-device, verify that the overtime record is saved with the correct
#         duration, activity notes, and timestamp.
