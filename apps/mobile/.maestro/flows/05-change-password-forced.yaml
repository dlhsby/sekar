appId: com.wahyutrip.sekar
---
# 05-change-password-forced.yaml
# Forced password change (AS-5) — login as user with password_must_change=true
# Scenario: Backend returns temporary password that forces change on first login
# This test uses a seeded test user with password_must_change=true
# NOTE: The backend must seed a user with this flag; for now, manual setup or a
#       dedicated test user. Test user: temp_user/temp_password (flag set by seed)

# Clear app state to ensure clean login
- clearAppState

- launchApp
- assertVisible:
    id: username-input

# Login with a user that has password_must_change flag (pre-seeded by db:seed)
- tapOn:
    id: username-input
- inputText: temp_user

- tapOn:
    id: password-input
- inputText: temp_password

- tapOn:
    id: login-button

- wait: 2000

# Should redirect to ChangePasswordScreen (AS-5) instead of home
- assertVisible:
    id: change-password-screen

# Verify the requirement checklist is visible
- assertVisible:
    id: change-password-rules

# Enter new password (8+ chars, letters + numbers)
- tapOn:
    id: change-password-new
- inputText: NewPass123

# Confirm password
- tapOn:
    id: change-password-confirm
- inputText: NewPass123

- wait: 500

# Verify requirements are met (the checklist should show "DIBERIKAN" for all)
- assertVisible:
    text: Minimal 8 karakter

- assertVisible:
    text: Berisi huruf dan angka

- assertVisible:
    text: Konfirmasi cocok

# Submit the password change
- tapOn:
    id: change-password-submit

- wait: 2000

# After successful change, should see success overlay (AS-5b) and then redirect to home
- assertVisible:
    id: change-password-success

- wait: 1500

# After the redirect delay, should see home screen
- assertVisible:
    text: Beranda
