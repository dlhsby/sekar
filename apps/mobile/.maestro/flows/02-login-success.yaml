appId: com.wahyutrip.sekar
---
# 02-login-success.yaml
# Valid login flow — satgas1 logs in and reaches FieldHomeScreen (HOME-1)
# Scenario: satgas1/12345678 → valid credentials → role-aware home screen loads

- launchApp
- assertVisible:
    id: username-input

# Enter satgas1 username
- tapOn:
    id: username-input
- inputText: satgas1

# Tab to password field
- tapOn:
    id: password-input
- inputText: 12345678

# Tap login button
- tapOn:
    id: login-button

- wait: 2000

# Should reach the home screen; we check for a testID we know exists in FieldHomeScreen
# (the absensi card is present in the satgas/field worker home)
# If onboarding triggers (first login ever), we'll see the onboarding welcome instead
# For this test, assume the account has been onboarded. If not, first login will
# redirect to onboarding — that's tested separately in 06-onboarding-first-launch.yaml

# After successful login, check for either home screen or onboarding
- assertVisible:
    text: Beranda|Onboarding Welcome|Lokasi Anda
