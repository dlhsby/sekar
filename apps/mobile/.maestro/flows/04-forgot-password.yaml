appId: com.wahyutrip.sekar
---
# 04-forgot-password.yaml
# Forgot password flow — LoginScreen → "Lupa Kata Sandi?" → ForgotPasswordScreen → contact admin
# Scenario: User taps forgot password link, sees contact screen (AS-4), can attempt tel:/wa.me

- launchApp
- assertVisible:
    id: username-input

# Tap "Lupa Kata Sandi?" link
- tapOn:
    id: forgot-password-link

- wait: 1000

# Should reach ForgotPasswordScreen (AS-4)
- assertVisible:
    id: forgot-password-screen

# Verify the title and instructions are visible
- assertVisible:
    text: Sandi tidak bisa di-reset sendiri

# Verify both contact options are visible
- assertVisible:
    id: forgot-wa

- assertVisible:
    id: forgot-tel

# Verify the note about password reset
- assertVisible:
    text: Setelah sandi di-reset

# MANUAL: Tapping wa.me or tel: links would open the device's WhatsApp/Phone app.
# In CI, these external intents don't complete; we verify the button is tappable.
# On a real device, verifying the intent fires would require platform-specific logic.

# Tap the back button to return to login
- tapOn:
    id: forgot-password-back

- wait: 500

# Should return to LoginScreen
- assertVisible:
    id: username-input
