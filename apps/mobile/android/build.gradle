buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        // Pin play-services-location so EVERY native module compiles against the
        // same version react-native-maps 1.27 uses (21.3.0, where
        // FusedLocationProviderClient is an interface). Without this,
        // react-native-geolocation-service compiles against its old class-based
        // default → IncompatibleClassChangeError at runtime.
        // `googlePlayServicesLocationVersion` → react-native-maps;
        // `playServicesLocationVersion` → react-native-geolocation-service.
        googlePlayServicesLocationVersion = "21.3.0"
        playServicesLocationVersion = "21.3.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.4")
    }
}

apply plugin: "com.facebook.react.rootproject"
