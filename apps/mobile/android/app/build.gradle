apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
// FCM: Uncomment when google-services.json is added (see specs/deployment/credentials-setup.md)
apply plugin: "com.google.gms.google-services"
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

// Resolve the Google Maps SDK key without committing it to source. Order:
//   1. SEKAR_MAPS_API_KEY gradle property (~/.gradle, -P…, ORG_GRADLE_PROJECT_… env)
//   2. GOOGLE_MAPS_API_KEY from the env file this build targets — the same file Babel
//      reads via ENVFILE (so release builds use .env.runtime, which the build:android:*
//      scripts decrypt from .env.staging/.env.production → the env-specific key).
//   3. Falls back to .env.local (debug/dev). All are gitignored; one source feeds both
//      the JS layer and the native manifest. NB: debug builds use the debug keystore's
//      SHA-1, so .env.local's key must be authorized for that SHA-1 (or unrestricted).
def resolveMapsApiKey = {
    def fromProp = project.findProperty('SEKAR_MAPS_API_KEY')
    if (fromProp) {
        return fromProp
    }
    def envName = System.getenv('ENVFILE') ?: '.env.local'
    def candidates = [envName, '.env.local'].unique()
    for (name in candidates) {
        def envFile = file("${rootProject.projectDir}/../${name}")
        if (envFile.exists()) {
            def line = envFile.readLines().find { it.trim().startsWith('GOOGLE_MAPS_API_KEY=') }
            if (line) {
                def val = line.substring(line.indexOf('=') + 1).trim().replaceAll('^["\']|["\']$', '')
                if (val) { return val }
            }
        }
    }
    return ''
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.wahyutrip.sekar"
    defaultConfig {
        applicationId "com.wahyutrip.sekar"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "0.1.3"
        // Google Maps SDK key — resolved from the SEKAR_MAPS_API_KEY gradle
        // property or GOOGLE_MAPS_API_KEY in .env.local (see resolveMapsApiKey).
        // Empty fallback keeps the build green; maps render blank until it is set.
        manifestPlaceholders = [MAPS_API_KEY: resolveMapsApiKey()]
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_LD=lld"
                version "3.31.4"
            }
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('SEKAR_RELEASE_STORE_FILE')) {
                storeFile file(SEKAR_RELEASE_STORE_FILE)
                storePassword SEKAR_RELEASE_STORE_PASSWORD
                keyAlias SEKAR_RELEASE_KEY_ALIAS
                keyPassword SEKAR_RELEASE_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Use release signing config if available, fall back to debug for local testing
            signingConfig signingConfigs.release ?: signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

// Pin play-services-location to the version react-native-maps 1.27 compiles
// against (21.3.0). Forcing an older version (18.x) makes maps' native code load
// a mismatched FusedLocationProviderClient at runtime →
// IncompatibleClassChangeError. 21.3.0 is also fine for
// react-native-geolocation-service. Base/basement/tasks resolve transitively.
configurations.all {
    resolutionStrategy {
        force 'com.google.android.gms:play-services-location:21.3.0'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // Match react-native-maps' expected play-services-location (see the force above).
    implementation("com.google.android.gms:play-services-location:21.3.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// ──────────────────────────────────────────────────────────────────────────
// Pre-build guard. The claude-mem plugin auto-generates `CLAUDE.md` context
// files per directory; when one lands under `src/main/res/**` the Android
// resource merger aborts ("file name must end with .xml or .png"). Strip any
// stray non-resource docs from res/ before every build so they can't break it.
// ──────────────────────────────────────────────────────────────────────────
tasks.register('stripStrayResourceDocs') {
    doFirst {
        def resDir = file("src/main/res")
        if (resDir.exists()) {
            fileTree(dir: resDir).matching { include '**/*.md' }.each { f ->
                println "stripStrayResourceDocs: removing stray ${f}"
                f.delete()
            }
        }
    }
}
tasks.matching { it.name == 'preBuild' }.configureEach { dependsOn 'stripStrayResourceDocs' }
