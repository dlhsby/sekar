# SEKAR Backend - Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
# - .env.production file auto-generated by CI/CD from GitHub Secrets
# - ECR_REGISTRY environment variable must be set
# - AWS ECR login completed (aws ecr get-login-password)
# - RDS endpoint accessible from EC2
# - S3 bucket exists with proper IAM permissions

version: '3.8'

services:
  backend:
    image: ${ECR_REGISTRY}/sekar-backend:latest
    container_name: sekar-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production  # ✅ Auto-generated by CI/CD
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.9'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Note: Database is external (AWS RDS)
# S3 is used for media storage
# No local volumes needed for production

networks:
  default:
    driver: bridge
