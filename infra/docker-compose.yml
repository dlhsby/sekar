services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: sekar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sekar_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sekar-db-network

  # Adminer - Database Management Tool
  adminer:
    image: adminer:latest
    container_name: sekar-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sekar-db-network

  # LocalStack - Local AWS Cloud Stack
  localstack:
    image: localstack/localstack:3.0
    container_name: sekar-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3                           # Only S3 service (fast startup: ~5s)
      DEBUG: ${LOCALSTACK_DEBUG:-0}          # Set to 1 for verbose logs
      DATA_DIR: /var/lib/localstack/data     # Persistent data directory
      EAGER_SERVICE_LOADING: 1               # Load S3 immediately
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"      # LocalStack gateway
    volumes:
      - ./localstack/data:/var/lib/localstack/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sekar-db-network

  # Redis 7 — Phase 3 Monitoring v2
  # Host port defaults to 16379 to avoid colliding with other Redis
  # installations on the dev box (system Redis, other projects, etc.).
  # Override via REDIS_PORT in infra/.env. Container internal port stays
  # 6379 so no app config inside the network needs to change.
  redis:
    image: redis:7-alpine
    container_name: sekar-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - sekar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sekar-db-network

networks:
  sekar-db-network:
    driver: bridge

volumes:
  sekar-redis-data:
