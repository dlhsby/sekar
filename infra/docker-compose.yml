services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sekar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sekar_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sekar-db-network

  # Adminer - Database Management Tool
  adminer:
    image: adminer:latest
    container_name: sekar-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sekar-db-network

  # MinIO — S3-compatible object storage (replaces LocalStack; same engine as
  # the production stack so dev and prod behave identically). API on :9000,
  # web console on :9001. The backend's S3InitService auto-creates the bucket
  # on boot in development; minio-init below also guarantees it (parity w/ prod).
  minio:
    image: minio/minio:latest
    container_name: sekar-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"                  # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"          # web console
    volumes:
      - sekar-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sekar-db-network

  # One-shot: create the dev media bucket then exit (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER:-minioadmin}\" \"$${MINIO_ROOT_PASSWORD:-minioadmin}\" &&
      mc mb --ignore-existing local/\"$${AWS_S3_BUCKET:-sekar-media-dev}\" &&
      echo 'bucket ready: '\"$${AWS_S3_BUCKET:-sekar-media-dev}\"
      "
    networks:
      - sekar-db-network

  # Redis 7 — Phase 3 Monitoring v2
  # Host port defaults to 16379 to avoid colliding with other Redis
  # installations on the dev box (system Redis, other projects, etc.).
  # Override via REDIS_PORT in infra/.env. Container internal port stays
  # 6379 so no app config inside the network needs to change.
  redis:
    image: redis:7-alpine
    container_name: sekar-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - sekar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sekar-db-network

networks:
  sekar-db-network:
    driver: bridge

volumes:
  sekar-redis-data:
  sekar-minio-data:
