# SEKAR — Nginx reverse proxy (TLS termination) for the production compose stack.
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.prod.yml.
#
# Routes:
#   /            -> web dashboard (Next.js standalone, :3000)
#   /api/        -> backend API (NestJS, :3000)
#   /socket.io/  -> backend WebSocket (real-time monitoring) with upgrade headers
#
# Replace sekar.example.com with your domain. TLS certs are expected at
# /etc/nginx/certs/{fullchain.pem,privkey.pem} (see deployment-guide.md §TLS).

# --- Upstreams (compose service names resolve on the shared network) ---
upstream sekar_backend { server backend:3000; }
upstream sekar_web     { server web:3000; }

# Map for WebSocket connection upgrade.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# --- HTTP: serve ACME challenges, redirect everything else to HTTPS ---
server {
  listen 80;
  server_name sekar.example.com;

  # Let's Encrypt http-01 challenge (certbot writes here).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS ---
server {
  listen 443 ssl;
  http2 on;
  server_name sekar.example.com;

  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;

  # Security headers (the backend also sets Helmet headers on /api responses).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Media uploads can be large (work-report photos/video).
  client_max_body_size 60M;

  # Backend API.
  location /api/ {
    proxy_pass http://sekar_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # WebSocket gateway (socket.io) — needs the upgrade dance.
  location /socket.io/ {
    proxy_pass http://sekar_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;   # keep long-lived sockets open
  }

  # Web dashboard (everything else).
  location / {
    proxy_pass http://sekar_web;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
