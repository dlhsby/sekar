name: Backend Quality Gate

# Lint + type-check + unit tests for the NestJS backend. **Reusable** — invoked by
# `pr-gate.yml` (the single required merge check) when `be/**` changes on a PR, and re-run
# as the `quality-be` job inside `deploy-staging.yml` on a release.
on:
  workflow_call: {}

jobs:
  lint-typecheck-test:
    name: Lint + Type Check + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: be
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: be/package-lock.json
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"
      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json
      - name: Unit tests
        run: npm test
