# Web E2E (Phase 4-9 C1) — Playwright against the mocked API.
# The UI suite needs no backend (route mocks); the security spec (12) self-skips
# when no API is reachable and runs on staging with API_URL set.
name: Web E2E

# MANUAL-only to conserve GitHub Actions minutes — Playwright installs a browser and
# is the heaviest job in the repo. Run it from the Actions tab ("Run workflow") before
# a staging release, or locally with `npm run test:e2e`. (Previously ran on every push
# to main touching fe/web/**, which was a big minute drain.)
on:
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright (chromium, mocked API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: fe/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: fe/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: fe/web/playwright-report/
          retention-days: 7
