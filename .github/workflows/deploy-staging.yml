name: Deploy staging (AWS)

# Builds the backend + web production images, pushes them to ECR, snapshots the
# RDS database, then deploys to the shared EC2 host via SSM Run Command (no SSH).
# Auth uses GitHub OIDC — no long-lived AWS keys stored in GitHub.
#
# Required repo Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION        ap-southeast-3
#   AWS_ROLE_ARN      arn:aws:iam::659828096624:role/sekar-gha-deploy
#   ECR_BACKEND       659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-backend
#   ECR_WEB           659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-web
#   EC2_INSTANCE_ID   i-08edccdc966c0985e
#   RDS_INSTANCE_ID   kobin-kpi-db
# Required repo Secret:
#   NEXT_PUBLIC_MAPBOX_TOKEN   pk.* Mapbox public token (baked into the web bundle)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  # UAT runs over plain HTTP (no TLS yet). Switch to https/wss when Caddy auto-HTTPS
  # is enabled (drop the http:// prefix in infra/Caddyfile.staging).
  API_URL: http://api.sekar.wahyutrip.com
  WS_URL: ws://api.sekar.wahyutrip.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./be/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ECR_BACKEND }}:staging
            ${{ vars.ECR_BACKEND }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=sekar-backend
          cache-to: type=gha,mode=max,scope=sekar-backend

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./fe/web
          file: ./fe/web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}
            NEXT_PUBLIC_WS_URL=${{ env.WS_URL }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          tags: |
            ${{ vars.ECR_WEB }}:staging
            ${{ vars.ECR_WEB }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=sekar-web
          cache-to: type=gha,mode=max,scope=sekar-web

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging # add required reviewers in repo settings to gate prod-like deploys
    permissions:
      id-token: write
      contents: read
    env:
      SHA: ${{ needs.build-push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Pre-deploy RDS snapshot
        run: |
          set -euo pipefail
          SNAP="sekar-staging-predeploy-${SHA}-$(date +%Y%m%d%H%M%S)"
          aws rds create-db-snapshot \
            --db-instance-identifier "${{ vars.RDS_INSTANCE_ID }}" \
            --db-snapshot-identifier "$SNAP" >/dev/null
          echo "Snapshot initiated: $SNAP"

      - name: Deploy via SSM (seed env, pull, migrate, up --wait)
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 infra/compose.staging.yml)
          SEED_B64=$(base64 -w0 infra/seed-env-from-ssm.sh)

          # Script that runs on the box as ec2-user (ECR cred helper lives there).
          BOX=$(cat <<EOF
          set -e
          mkdir -p ~/sekar/infra
          echo $COMPOSE_B64 | base64 -d > ~/sekar/infra/compose.staging.yml
          echo $SEED_B64 | base64 -d > ~/sekar/infra/seed-env-from-ssm.sh
          docker network create edge 2>/dev/null || true
          docker network connect edge kobin-kpi-caddy 2>/dev/null || true
          bash ~/sekar/infra/seed-env-from-ssm.sh
          cd ~/sekar/infra
          export IMAGE_TAG=$SHA
          docker compose -f compose.staging.yml pull
          docker compose -f compose.staging.yml run --rm --no-deps backend npm run migration:run:prod
          docker compose -f compose.staging.yml up -d --wait
          docker image prune -f
          EOF
          )
          RUN_B64=$(printf '%s' "$BOX" | base64 -w0)
          printf '{"commands":["runuser -l ec2-user -c \\"echo %s | base64 -d | bash\\""]}' "$RUN_B64" > params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy-staging ${SHA}" \
            --parameters file://params.json \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query Status --output text)
          echo "::group::stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardOutputContent --output text | tail -60
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardErrorContent --output text | tail -60
          echo "::endgroup::"
          echo "Deploy status: $STATUS"
          test "$STATUS" = "Success"

      - name: Smoke test
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            if curl -fsS http://api.sekar.wahyutrip.com/api/v1/health/live >/dev/null; then
              echo "API healthy"; break
            fi
            echo "waiting for API... ($i)"; sleep 6
          done
          curl -fsS http://api.sekar.wahyutrip.com/api/v1/health/live
          curl -fsSI http://sekar.wahyutrip.com/login | head -1
