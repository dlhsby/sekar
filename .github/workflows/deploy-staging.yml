name: Deploy staging (AWS)

# Builds the backend + web + docs images, pushes them to ECR, snapshots the
# RDS database, then deploys to the shared EC2 host via SSM Run Command (no SSH).
# Auth uses GitHub OIDC — no long-lived AWS keys stored in GitHub.
#
# Required repo Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION        ap-southeast-3
#   AWS_ROLE_ARN      arn:aws:iam::659828096624:role/sekar-gha-deploy
#   ECR_BACKEND       659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-backend
#   ECR_WEB           659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-web
#   ECR_DOCS          659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-docs
#   EC2_INSTANCE_ID   i-08edccdc966c0985e
#   RDS_INSTANCE_ID   dlhsby
# Required Environment Secret (staging environment):
#   WEB_DOTENV_PRIVATE_KEY   dotenvx private key that decrypts apps/web/.env.staging at build
#                            time (NEXT_PUBLIC_* incl. the Google Maps key).
# Backend staging config lives in the encrypted apps/be/.env.staging baked into the image; the
# box decrypts it at runtime with DOTENV_PRIVATE_KEY_STAGING fetched from SSM
# (/sekar/staging/DOTENV_PRIVATE_KEY). See specs/deployment/encrypted-secrets.md.

on:
  # Deploy is DELIBERATE, not every-push. Release to staging by merging
  #   main -> staging   (i.e. push to the `staging` branch),
  # or trigger manually from the Actions tab ("Run workflow"). Pushing to `main`
  # does NOT deploy — that keeps GitHub Actions usage within the free-tier minutes
  # (this job builds 3 Docker images, so it must only run on an actual release).
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # Test gates — build/deploy only runs if backend + web pass. Final safety check
  # before a staging release (PRs to main are already gated by backend-quality.yml /
  # web-quality.yml; this re-runs them on the release commit).
  # Reuse the SAME suites the PR gate uses (single source of truth) as a final check on the
  # release commit before building/deploying.
  quality-be:
    uses: ./.github/workflows/backend-quality.yml

  quality-web:
    uses: ./.github/workflows/web-quality.yml

  build-push:
    needs: [quality-be, quality-web]
    runs-on: ubuntu-latest
    # Scoped to the staging environment so it can read env-level secrets
    # (WEB_DOTENV_PRIVATE_KEY). This is the SINGLE approval gate for a release — the
    # deploy job below is NOT environment-scoped (it only uses repo vars + OIDC), so the
    # whole release is approved once, here, before any image is built.
    environment: staging
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/be
          file: ./apps/be/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha }}
            BUILD_TIME=${{ steps.vars.outputs.built_at }}
          tags: |
            ${{ vars.ECR_BACKEND }}:staging
            ${{ vars.ECR_BACKEND }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=sekar-backend
          cache-to: type=gha,mode=max,scope=sekar-backend

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          # NEXT_PUBLIC_* (incl. the Google Maps key) are decrypted from the committed
          # encrypted apps/web/.env.staging by dotenvx during `next build`. The private key is passed
          # as a BuildKit secret — mounted only for the build RUN, never in an image layer.
          build-args: |
            DOTENV_ENV=staging
            GIT_SHA=${{ steps.vars.outputs.sha }}
            BUILD_TIME=${{ steps.vars.outputs.built_at }}
          secrets: |
            dotenv_private_key=${{ secrets.WEB_DOTENV_PRIVATE_KEY }}
          tags: |
            ${{ vars.ECR_WEB }}:staging
            ${{ vars.ECR_WEB }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=sekar-web
          cache-to: type=gha,mode=max,scope=sekar-web

      - name: Build & push docs
        uses: docker/build-push-action@v6
        with:
          context: ./apps/docs
          file: ./apps/docs/Dockerfile
          platforms: linux/amd64
          push: true
          # Static site — no secrets. Site identity is baked at build time.
          build-args: |
            DOCS_URL=https://docs.sekar.wahyutrip.com
            DOCS_BASE_URL=/
            APP_URL=https://sekar.wahyutrip.com
          tags: |
            ${{ vars.ECR_DOCS }}:staging
            ${{ vars.ECR_DOCS }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=sekar-docs
          cache-to: type=gha,mode=max,scope=sekar-docs

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # NOT environment-scoped on purpose: it only uses repo Variables + OIDC (no env-level
    # secrets), and the OIDC trust is `repo:dlhsby/sekar:*`. Keeping it off the environment
    # means a release is approved ONCE (at build-push), not twice.
    permissions:
      id-token: write
      contents: read
    env:
      SHA: ${{ needs.build-push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Pre-deploy RDS snapshot
        run: |
          set -euo pipefail
          SNAP="sekar-staging-predeploy-${SHA}-$(date +%Y%m%d%H%M%S)"
          aws rds create-db-snapshot \
            --db-instance-identifier "${{ vars.RDS_INSTANCE_ID }}" \
            --db-snapshot-identifier "$SNAP" >/dev/null
          echo "Snapshot initiated: $SNAP"
          # Wait for the snapshot to finish before migrating. On single-AZ RDS the
          # snapshot briefly freezes I/O at the start; running migrate during that
          # window drops the DB connection ("Connection terminated due to connection
          # timeout") and fails the deploy. Waiting also serializes against any
          # in-flight snapshot (RDS allows only one at a time per instance).
          aws rds wait db-snapshot-available --db-snapshot-identifier "$SNAP"
          echo "Snapshot completed: $SNAP"

      - name: Deploy via SSM (seed env, pull, migrate, up --wait)
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 infra/compose.staging.yml)
          SEED_B64=$(base64 -w0 infra/seed-env-from-ssm.sh)
          CADDY_B64=$(base64 -w0 infra/Caddyfile.staging)

          # Script that runs on the box as ec2-user (ECR cred helper lives there).
          BOX=$(cat <<EOF
          set -e
          mkdir -p ~/sekar/infra
          echo $COMPOSE_B64 | base64 -d > ~/sekar/infra/compose.staging.yml
          echo $SEED_B64 | base64 -d > ~/sekar/infra/seed-env-from-ssm.sh
          # SEKAR owns the box's Caddy (the sekar-caddy service); ship its Caddyfile.
          # Ensure the co-tenant drop-in dir exists so the bind-mount source is present
          # (Docker would otherwise create it root-owned); sekar never overwrites it.
          mkdir -p ~/sekar/infra/conf.d
          echo $CADDY_B64 | base64 -d > ~/sekar/infra/Caddyfile
          docker network create edge 2>/dev/null || true
          bash ~/sekar/infra/seed-env-from-ssm.sh
          cd ~/sekar/infra
          export IMAGE_TAG=$SHA
          # Reclaim disk BEFORE pulling new SHA-pinned images. The box accumulates
          # one set of per-SHA images per deploy and has hit "no space left on
          # device" mid-pull. Running containers keep their images, so this only
          # drops unused image layers + build cache (never volumes/certs).
          docker image prune -af || true
          docker builder prune -af || true
          df -h / | tail -1
          # --quiet keeps SSM stdout under its 24KB cap (huge layer logs were truncating
          # the tail, hiding the post-deploy assertion).
          docker compose -f compose.staging.yml pull --quiet
          # MAINTENANCE WINDOW: stop the app BEFORE migrating.
          #
          # Migrations used to run while the old containers kept serving, so the old
          # code met the new schema the moment a rename committed (areas->locations,
          # rayons->districts) — every request 500'd for the whole migration window,
          # and worse, writes landed against a half-migrated schema. Stopping first
          # turns that into honest downtime: Caddy returns 502 until the new image is
          # up. Redis + caddy stay up so the window is as short as possible.
          docker compose -f compose.staging.yml stop backend web || true
          # -T: do NOT attach a TTY/stdin — otherwise `compose run` consumes the rest of
          # this script (it's fed to bash via a file, but -T is correct regardless).
          docker compose -f compose.staging.yml run --rm --no-deps -T --quiet-pull backend npm run migration:run:prod
          # RBAC bootstrap. AddRbacTables creates roles/permissions/role_permissions
          # EMPTY and no migration ever inserts rows — only the seeder does. Without
          # this, RolePermissionsService resolves [] for every role, so every
          # @RequirePermissions handler 403s and every monitoring_scope is `none`:
          # staging comes up authenticated but authorization-dead.
          #
          # db:seed:prod is the REFERENCE profile — non-destructive, idempotent
          # (ON CONFLICT DO NOTHING), safe on every deploy. NEVER use db:seed:staging
          # here: that one calls truncateAll() and would wipe the database.
          docker compose -f compose.staging.yml run --rm --no-deps -T backend npm run db:seed:prod
          # --force-recreate guarantees containers are rebuilt from the freshly pulled,
          # SHA-pinned image (a plain up can no-op against a stale local tag). It also
          # recreates sekar-caddy so a changed Caddyfile (new inode) and the recreated
          # upstream container IPs are both picked up — no separate caddy reload needed.
          docker compose -f compose.staging.yml up -d --force-recreate --wait
          # Drop the cached role->permissions sets (ADR-044, 300s TTL). They are keyed
          # by role CODE, and the revamp renames two of them (top_management ->
          # management, admin_data -> admin_rayon), so a stale entry would answer for a
          # role that no longer exists. Cheap and safe: the cache is fail-open and
          # repopulates from the DB on the next request.
          docker exec sekar-redis redis-cli --scan --pattern 'rbac:role:*' 2>/dev/null \
            | xargs -r -n50 docker exec -i sekar-redis redis-cli DEL >/dev/null 2>&1 || true
          docker image prune -f
          # Fail loudly if the running image is not the SHA we just built — otherwise a
          # stale container would pass the smoke test (false positive).
          RUNNING_BE=\$(docker inspect sekar-backend --format '{{.Config.Image}}')
          EXPECT_BE="659828096624.dkr.ecr.ap-southeast-3.amazonaws.com/sekar-backend:\$IMAGE_TAG"
          echo "running backend image: \$RUNNING_BE (expected \$EXPECT_BE)"
          test "\$RUNNING_BE" = "\$EXPECT_BE"
          echo "DEPLOY-VERIFIED \$IMAGE_TAG"
          EOF
          )
          RUN_B64=$(printf '%s' "$BOX" | base64 -w0)
          # Run from a FILE, not piped stdin — a piped script is on bash's stdin, which
          # `docker compose run` would consume, silently skipping everything after it.
          printf '{"commands":["runuser -l ec2-user -c \\"echo %s | base64 -d > /tmp/sekar-deploy.sh && bash /tmp/sekar-deploy.sh\\""]}' "$RUN_B64" > params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy-staging ${SHA}" \
            --parameters file://params.json \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD_ID"
          # Poll up to ~25 min. A routine deploy (recreate + healthcheck) runs ~2 min,
          # but the revamp cutover runs 38 migrations — two of them large data-adoption
          # migrations — against a multi-GB database on a db.t4g.micro. The old ~6 min
          # cap would have expired MID-CHAIN and failed the job while migrations kept
          # running, leaving a partially-migrated DB behind a red build.
          STATUS=InProgress
          for i in $(seq 1 300); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break;; esac
            sleep 5
          done
          echo "::group::stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardOutputContent --output text | tail -60
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query StandardErrorContent --output text | tail -60
          echo "::endgroup::"
          echo "Deploy status: $STATUS"
          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            echo "::error::Deploy still running when the poll expired — STATE IS UNKNOWN."
            echo "The migration chain may be mid-flight. DO NOT re-run this workflow blindly:"
            echo "a partially-migrated database is not a valid starting state. Inspect the"
            echo "migrations table on the box first, then follow the rollback decision tree"
            echo "in specs/deployment/staging-cutover-runbook.md."
            exit 1
          fi
          test "$STATUS" = "Success"

      - name: Smoke test
        run: |
          set -euo pipefail
          # --retry covers the brief window while Caddy provisions the Let's Encrypt cert.
          for i in $(seq 1 10); do
            if curl -fsS --retry 3 https://api.sekar.wahyutrip.com/api/v1/health/live >/dev/null; then
              echo "API healthy"; break
            fi
            echo "waiting for API... ($i)"; sleep 6
          done
          curl -fsS https://api.sekar.wahyutrip.com/api/v1/health/live
          curl -fsSI https://sekar.wahyutrip.com/login | head -1
          # Docs site — public, no auth. Retry covers first-time Let's Encrypt issuance
          # for the new docs.sekar.wahyutrip.com host.
          curl -fsSI --retry 5 --retry-delay 6 https://docs.sekar.wahyutrip.com | head -1
