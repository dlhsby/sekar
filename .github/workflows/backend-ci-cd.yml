# SEKAR Backend CI/CD - Production Only
# Automated secret management with GitHub Secrets
# Triggered on: push to main branch
#
# Pipeline stages:
# 1. Lint - ESLint and Prettier checks
# 2. Test - Unit tests with PostgreSQL service
# 3. Security - npm audit and secret scanning
# 4. Build - Build and push Docker image to ECR
# 5. Deploy - SSH deploy to production EC2 with automated .env generation

name: Backend CI/CD - Production

on:
  push:
    branches: [main]
    paths:
      - 'be/**'
      - '.github/workflows/backend-ci-cd.yml'

env:
  NODE_VERSION: '24'
  AWS_REGION: ap-southeast-3

jobs:
  # ==========================================================================
  # Job 1: Code Quality Checks
  # ==========================================================================
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./be

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=-1

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

  # ==========================================================================
  # Job 2: Unit and Integration Tests
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./be

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sekar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: sekar_test
          JWT_SECRET: test-secret-key-minimum-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-key-minimum-32
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./be/coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::warning::Coverage $COVERAGE% is below 80% threshold"
            fi
          fi

  # ==========================================================================
  # Job 3: Security Scanning
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./be

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./be
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  # ==========================================================================
  # Job 4: Build and Push Docker Image
  # ==========================================================================
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: [test, security]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        working-directory: ./be
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/sekar-backend:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/sekar-backend:$IMAGE_TAG $ECR_REGISTRY/sekar-backend:latest
          docker push $ECR_REGISTRY/sekar-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/sekar-backend:latest

  # ==========================================================================
  # Job 5: Deploy to Production EC2
  # ==========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: http://api.sekar.wahyutrip.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Environment variables - will be expanded into .env.production
          NODE_ENV: production
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_CLIENT_EMAIL: ${{ secrets.FCM_CLIENT_EMAIL }}
          FCM_PRIVATE_KEY: ${{ secrets.FCM_PRIVATE_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,NODE_ENV,DATABASE_HOST,DATABASE_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_S3_BUCKET,CORS_ORIGIN,FCM_PROJECT_ID,FCM_CLIENT_EMAIL,FCM_PRIVATE_KEY
          script: |
            cd ~/sekar/backend

            # Auto-generate .env.production from GitHub Secrets
            cat > .env.production << 'ENVEOF'
            NODE_ENV=${NODE_ENV}
            PORT=3000
            DATABASE_HOST=${DATABASE_HOST}
            DATABASE_PORT=5432
            DATABASE_USER=sekar_admin
            DATABASE_PASSWORD=${DATABASE_PASSWORD}
            DATABASE_NAME=sekar_db
            DATABASE_SYNCHRONIZE=false
            DATABASE_MIGRATIONS_RUN=false
            DATABASE_SSL=true
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRATION=15m
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            JWT_REFRESH_EXPIRATION=7d
            AWS_REGION=ap-southeast-3
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_S3_BUCKET=${AWS_S3_BUCKET}
            CORS_ORIGIN=${CORS_ORIGIN}
            RATE_LIMIT_TTL=60
            RATE_LIMIT_MAX=100
            RATE_LIMIT_LOGIN_MAX=5
            FCM_ENABLED=false
            FCM_PROJECT_ID=${FCM_PROJECT_ID}
            FCM_CLIENT_EMAIL=${FCM_CLIENT_EMAIL}
            FCM_PRIVATE_KEY=${FCM_PRIVATE_KEY}
            NOTIFICATION_RETRY_ATTEMPTS=3
            TASK_AUTO_ASSIGN_ENABLED=false
            TASK_DEADLINE_WARNING_HOURS=24
            KMZ_MAX_FILE_SIZE_MB=10
            KMZ_MAX_POLYGONS=100
            ENVEOF

            # Expand variables using envsubst
            envsubst < .env.production > .env.production.tmp
            mv .env.production.tmp .env.production

            # Set restrictive permissions
            chmod 600 .env.production

            # Verify .env created
            if [ ! -f .env.production ]; then
              echo "ERROR: Failed to create .env.production"
              exit 1
            fi

            echo "✅ Backend .env.production created"

            # Login to ECR
            aws ecr get-login-password --region ap-southeast-3 | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull latest image
            docker pull $ECR_REGISTRY/sekar-backend:latest

            # Wipe database clean (development phase - okay to reset)
            echo "🧹 Cleaning database..."
            docker run --rm \
              -e PGPASSWORD=${DATABASE_PASSWORD} \
              postgres:14-alpine \
              psql -h ${DATABASE_HOST} -U sekar_admin -d sekar_db \
              -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO sekar_admin; GRANT ALL ON SCHEMA public TO public;" \
              || echo "Database already clean or first run"

            echo "✅ Database wiped clean"

            # Run migrations directly (without starting the full application)
            # This is more reliable than running the app with synchronize
            echo "📦 Running database migrations..."
            docker run --rm \
              -e DATABASE_HOST=${DATABASE_HOST} \
              -e DATABASE_PORT=5432 \
              -e DATABASE_USER=sekar_admin \
              -e DATABASE_PASSWORD=${DATABASE_PASSWORD} \
              -e DATABASE_NAME=sekar_db \
              -e DATABASE_SSL=true \
              -e NODE_ENV=production \
              $ECR_REGISTRY/sekar-backend:latest \
              sh -c "node ./node_modules/typeorm/cli.js migration:run -d dist/database/data-source.js && echo '✅ All migrations applied successfully'" \
              || {
                echo "❌ ERROR: Migration failed"
                docker logs sekar-backend 2>&1 | tail -100 || true
                exit 1
              }

            echo "✅ Migrations completed successfully"

            # Seed database with test data (DISABLED - run manually after deployment)
            echo "⏩ Skipping database seeding (run manually with: docker-compose -f docker-compose.prod.yml run --rm backend npm run seed:prod)"
            # docker-compose -f docker-compose.prod.yml run --rm backend npm run seed:prod || {
            #   echo "WARNING: Seeding failed, continuing anyway"
            # }

            # Deploy with zero-downtime
            echo "🚀 Starting backend container..."
            docker-compose -f docker-compose.prod.yml up -d backend

            # Wait for health check with retry logic
            echo "⏳ Waiting for backend health check..."
            for i in {1..30}; do
              if curl -f http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              echo "   Attempt $i/30: Health check not ready yet..."
              sleep 2
              if [ $i -eq 30 ]; then
                echo "❌ ERROR: Health check failed after 60 seconds"
                echo "📋 Container logs:"
                docker-compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
            done

            echo "✅ Backend deployment successful"

      - name: Notify deployment result
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice::Backend deployed to production successfully!"
            echo "API: http://api.sekar.wahyutrip.com"
            echo "Version: $COMMIT_SHA"
          else
            echo "::error::Backend deployment to production failed!"
          fi
