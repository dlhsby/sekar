name: Release server (be + web)

# Cuts a versioned, documented release of the SERVER tier (backend + web, which
# deploy together). Triggered by pushing a `sekar-vX.Y.Z` tag. It validates that
# the tag matches both package.json versions, builds + pushes version-pinned,
# PRODUCTION-configured images to ECR, and creates a GitHub Release with notes.
#
# It does NOT deploy — production is on-prem and deliberately promoted by hand:
#   on the box →  git checkout sekar-vX.Y.Z
#                 dotenvx run -f .env.production -- docker compose -f docker-compose.prod.yml up -d --build
#                 (or pull the :X.Y.Z images if the box has ECR access)
#
# Cut a release with scripts/release.sh server X.Y.Z (bumps both package.json, tags, pushes).

on:
  push:
    tags: ['sekar-v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC → ECR

concurrency:
  group: release-server-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # production environment → production WEB_DOTENV_PRIVATE_KEY (web bakes prod NEXT_PUBLIC_*).
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for auto-generated release notes

      - id: vars
        name: Derive + validate version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#sekar-v}"
          BE_VER=$(node -p "require('./apps/be/package.json').version")
          WEB_VER=$(node -p "require('./apps/web/package.json').version")
          echo "Tag=$TAG version=$VERSION · be=$BE_VER · web=$WEB_VER"
          if [ "$VERSION" != "$BE_VER" ] || [ "$VERSION" != "$WEB_VER" ]; then
            echo "::error::Tag $TAG ($VERSION) must match apps/be/package.json ($BE_VER) and apps/web/package.json ($WEB_VER). Use scripts/release.sh server $VERSION."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend (:version)
        uses: docker/build-push-action@v6
        with:
          context: ./be
          file: ./apps/be/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha }}
            BUILD_TIME=${{ steps.vars.outputs.built_at }}
          tags: ${{ vars.ECR_BACKEND }}:${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=sekar-backend
          cache-to: type=gha,mode=max,scope=sekar-backend

      - name: Build & push web (:version, production-configured)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            DOTENV_ENV=production
            GIT_SHA=${{ steps.vars.outputs.sha }}
            BUILD_TIME=${{ steps.vars.outputs.built_at }}
          secrets: |
            dotenv_private_key=${{ secrets.WEB_DOTENV_PRIVATE_KEY }}
          tags: ${{ vars.ECR_WEB }}:${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=sekar-web
          cache-to: type=gha,mode=max,scope=sekar-web

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            --title "Server release ${{ steps.vars.outputs.tag }}" \
            --generate-notes \
            --verify-tag
