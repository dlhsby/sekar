name: Mobile Release (Android)

# Manual trigger only — engineer dispatches per release.
# iOS deferred to Phase 5 (requires Xcodeproj + Podfile changes).
on:
  workflow_dispatch:
    inputs:
      release_track:
        description: Internal / closed beta / production
        type: choice
        options:
          - internal
          - closed-beta
          - production
        default: internal

jobs:
  build-android:
    name: Build Android AAB + upload source maps
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: fe/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: fe/mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Compute version + build number
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_CODE=$(date -u +%Y%m%d%H%M)
          RELEASE="sekar-mobile@${VERSION}+${BUILD_CODE}"
          {
            echo "version=${VERSION}"
            echo "build_code=${BUILD_CODE}"
            echo "short_sha=${SHORT_SHA}"
            echo "release=${RELEASE}"
          } >> "$GITHUB_OUTPUT"

      - name: Decode Android keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: fe/mobile/android
        run: |
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Install sentry-cli
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash

      - name: Sentry — create release + upload source maps
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_MOBILE }}
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          sentry-cli releases new "$RELEASE"
          sentry-cli releases set-commits "$RELEASE" --auto || true
          # Hermes source maps emitted by RN bundle step
          if [ -d "android/app/build/generated/sourcemaps/react/release" ]; then
            sentry-cli sourcemaps upload \
              --release="$RELEASE" \
              android/app/build/generated/sourcemaps/react/release
          else
            echo "sourcemaps dir not found — skipping (Hermes off?)"
          fi
          sentry-cli releases finalize "$RELEASE"

      - name: Upload AAB artifact
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_CODE: ${{ steps.version.outputs.build_code }}
        uses: actions/upload-artifact@v4
        with:
          name: sekar-android-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_code }}
          path: fe/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        env:
          RELEASE: ${{ steps.version.outputs.release }}
          TRACK: ${{ inputs.release_track }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          BUILD_CODE: ${{ steps.version.outputs.build_code }}
        run: |
          {
            echo "## Release $RELEASE"
            echo ""
            echo "- Track: \`$TRACK\`"
            echo "- Commit: \`$SHORT_SHA\`"
            echo "- Build code: \`$BUILD_CODE\`"
            echo "- AAB artifact uploaded above."
            echo ""
            echo "Promote to Play Console manually per the deployment runbook §3."
          } >> "$GITHUB_STEP_SUMMARY"
