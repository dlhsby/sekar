name: Mobile Release (Android · staging)

# Manual trigger only. Builds a SIGNED release APK + AAB for the staging environment
# and uploads them as downloadable artifacts. iOS is deferred (needs a macOS runner +
# APNs). Production is added later (same shape, production env + google-services).
#
# Required GitHub Environment secrets (staging):
#   MOBILE_DOTENV_PRIVATE_KEY     decrypts fe/mobile/.env.staging (API URL, Maps key, …)
#   GOOGLE_SERVICES_JSON_STAGING  base64 of the staging google-services.json
# Required repo secrets (signing):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# See specs/deployment/encrypted-secrets.md and android-release-guide.md.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging]
        default: staging

jobs:
  build-android:
    name: Build signed APK + AAB (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging
    defaults:
      run:
        working-directory: fe/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: fe/mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle   # caches ~/.gradle (deps + wrapper) across runs — survives `clean`

      - name: Install dependencies
        run: npm ci

      - name: Compute version + build number
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_CODE=$(date -u +%Y%m%d%H%M)
          {
            echo "version=${VERSION}"
            echo "build_code=${BUILD_CODE}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      # google-services plugin is applied, so a matching google-services.json must exist.
      - name: Place staging google-services.json
        env:
          GSJSON: ${{ secrets.GOOGLE_SERVICES_JSON_STAGING }}
        run: printf '%s' "$GSJSON" | base64 -d > android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      # Builds signed APK + AAB in one Gradle run. The script decrypts .env.staging to
      # .env.runtime (via MOBILE_DOTENV_PRIVATE_KEY) and points ENVFILE at it, so the JS
      # env + the env-specific Google Maps key are baked in. Signing config (build.gradle)
      # reads the SEKAR_RELEASE_* gradle properties supplied below as ORG_GRADLE_PROJECT_*.
      - name: Build signed APK + AAB (staging)
        env:
          DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.MOBILE_DOTENV_PRIVATE_KEY }}
          # Real-device ABIs only (drop emulator x86/x86_64) — ~halves native compile
          # time. To run the release APK on an x86_64 emulator, add x86_64 here.
          ORG_GRADLE_PROJECT_reactNativeArchitectures: arm64-v8a,armeabi-v7a
          ORG_GRADLE_PROJECT_SEKAR_RELEASE_STORE_FILE: release.keystore
          ORG_GRADLE_PROJECT_SEKAR_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_SEKAR_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_SEKAR_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run build:release:staging

      - name: Verify the APK is signed with the release key (not debug)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          $ANDROID_HOME/build-tools/*/apksigner verify --print-certs "$APK" | grep -i "Signer #1 certificate DN" || true
          echo "Signed APK present: $APK"

      - name: Upload signed APK + AAB
        uses: actions/upload-artifact@v4
        with:
          name: sekar-staging-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_code }}
          path: |
            fe/mobile/android/app/build/outputs/apk/release/app-release.apk
            fe/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_CODE: ${{ steps.version.outputs.build_code }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          {
            echo "## SEKAR Android — staging release"
            echo ""
            echo "- Version: \`$VERSION\` · build \`$BUILD_CODE\` · commit \`$SHORT_SHA\`"
            echo "- Signed **APK** (sideload) + **AAB** (Play) uploaded as the artifact above."
            echo "- API: staging (\`http://api.sekar.wahyutrip.com\`) · FCM project \`dlhsby-sekar-staging\`."
          } >> "$GITHUB_STEP_SUMMARY"
