# Phase 3 M1-R sub-phase 3-R1 — design-token drift gate.
#
# Validates specs/design-system/tokens.json against tokens.schema.json, re-runs the generator,
# and fails the build if the committed generated/ files drift. Also runs the
# generator + ESLint rule unit tests.
#
# See: ADR-036, specs/design-system/design-tokens.md, scripts/build-tokens.ts.
name: tokens-verify

on:
  pull_request:
    paths:
      - 'specs/design-system/tokens.json'
      - 'specs/design-system/tokens.schema.json'
      - 'scripts/build-tokens.ts'
      - 'scripts/build-tokens.test.ts'
      - 'tools/eslint-plugin-sekar-design/**'
      - 'apps/web/src/app/generated/**'
      - 'apps/mobile/src/constants/generated/**'
      - 'package.json'
      - '.github/workflows/tokens-verify.yml'
  push:
    branches: [main]
    paths:
      - 'specs/design-system/tokens.json'
      - 'specs/design-system/tokens.schema.json'
      - 'scripts/build-tokens.ts'
      - 'tools/eslint-plugin-sekar-design/**'
      - 'apps/web/src/app/generated/**'
      - 'apps/mobile/src/constants/generated/**'

jobs:
  verify:
    name: Verify generator output and run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dev dependencies
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Run tokens:verify drift gate
        run: npm run tokens:verify

      - name: Run unit tests
        run: npm run test:tokens
