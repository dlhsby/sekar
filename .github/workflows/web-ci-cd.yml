# SEKAR Web Dashboard CI/CD - Production Only
# Automated secret management with GitHub Secrets
# Triggered on: push to main branch
#
# Pipeline stages:
# 1. Lint - ESLint and TypeScript checks
# 2. Test - Jest unit tests with Next.js
# 3. Build - Build and push Docker image to ECR with production config
# 4. Deploy - SSH deploy to production EC2

name: Web Dashboard CI/CD - Production

on:
  push:
    branches: [main]
    paths:
      - 'fe/web/**'
      - '.github/workflows/web-ci-cd.yml'

env:
  NODE_VERSION: '24'
  AWS_REGION: ap-southeast-3

jobs:
  # ==========================================================================
  # Job 1: Code Quality Checks
  # ==========================================================================
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fe/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: fe/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript
        run: npm run type-check

      - name: Check Prettier formatting
        run: npm run format:check
        continue-on-error: true

  # ==========================================================================
  # Job 2: Unit Tests
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./fe/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: fe/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:3000
          NEXT_PUBLIC_MAPBOX_TOKEN: test-token

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          files: ./fe/web/coverage/lcov.info
          flags: web
          name: web-coverage
        continue-on-error: true

  # ==========================================================================
  # Job 3: Build and Push Docker Image
  # ==========================================================================
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        working-directory: ./fe/web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_API_URL: http://api.sekar.wahyutrip.com
          NEXT_PUBLIC_WS_URL: ws://api.sekar.wahyutrip.com
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL \
            --build-arg NEXT_PUBLIC_MAPBOX_TOKEN=$MAPBOX_TOKEN \
            -t $ECR_REGISTRY/sekar-web:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/sekar-web:$IMAGE_TAG $ECR_REGISTRY/sekar-web:latest
          docker push $ECR_REGISTRY/sekar-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/sekar-web:latest

  # ==========================================================================
  # Job 4: Deploy to Production EC2
  # ==========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: http://sekar.wahyutrip.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            cd ~/sekar/web

            # Login to ECR
            aws ecr get-login-password --region ap-southeast-3 | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull latest image
            docker pull $ECR_REGISTRY/sekar-web:latest

            # Deploy with zero-downtime
            docker-compose -f docker-compose.prod.yml up -d web

            # Wait for health check
            echo "Waiting for web dashboard health check..."
            sleep 10
            curl -f http://localhost:3001 || {
              echo "ERROR: Web health check failed"
              exit 1
            }

            echo "✅ Web deployment successful"

      - name: Notify deployment result
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice::Web dashboard deployed to production successfully!"
            echo "URL: http://sekar.wahyutrip.com"
            echo "Version: $COMMIT_SHA"
          else
            echo "::error::Web dashboard deployment to production failed!"
          fi
