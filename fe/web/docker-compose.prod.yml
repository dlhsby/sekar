# SEKAR Web Dashboard - Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
# - ECR_REGISTRY environment variable must be set
# - AWS ECR login completed (aws ecr get-login-password)
# - Backend API accessible at https://api.sekar.wahyutrip.com

version: '3.8'

services:
  web:
    image: ${ECR_REGISTRY}/sekar-web:latest
    container_name: sekar-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Note: Environment variables (NEXT_PUBLIC_*) are baked into the Docker image
# at build time via --build-arg in the CI/CD workflow.
# No .env file needed at runtime for Next.js static builds.

networks:
  default:
    driver: bridge
