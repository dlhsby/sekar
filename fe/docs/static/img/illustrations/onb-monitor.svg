      <!-- Stat card popping out -->
      <g transform="translate(178 130)">
        <rect x="4" y="4" width="80" height="64" rx="6" fill="#1C1917"/>
        <rect x="0" y="0" width="80" height="64" rx="6" fill="#FDFD96" stroke="#1C1917" stroke-width="3"/>
        <text x="10" y="20" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#44403C" letter-spacing="0.5">AKTIF</text>
        <text x="10" y="46" font-family="Space Grotesk" font-size="28" font-weight="700" fill="#1C1917">28</text>
        <text x="44" y="46" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#15803D">▲ 3</text>
