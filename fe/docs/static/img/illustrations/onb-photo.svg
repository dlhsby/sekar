<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" role="img" aria-label="SEKAR illustration">
      <line x1="20" y1="198" x2="260" y2="198" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 6"/>
      <!-- Report card (back) -->
      <g transform="translate(40 50) rotate(-4)">
        <rect x="4" y="4" width="120" height="140" rx="6" fill="#1C1917"/>
        <rect x="0" y="0" width="120" height="140" rx="6" fill="#FFFFFF" stroke="#1C1917" stroke-width="3"/>
        <!-- Photo area -->
        <rect x="10" y="10" width="100" height="60" rx="3" fill="#B5D2AD" stroke="#1C1917" stroke-width="2.5"/>
        <!-- Tree placeholder -->
        <path d="M40 60 L40 50 Q40 40 50 40 L60 40 Q70 40 70 50 L70 60 Z" fill="#7FBC8C" stroke="#1C1917" stroke-width="2"/>
        <rect x="52" y="60" width="6" height="6" fill="#8B7355" stroke="#1C1917" stroke-width="1.5"/>
        <circle cx="92" cy="20" r="6" fill="#FDFD96" stroke="#1C1917" stroke-width="2"/>
        <!-- Lines -->
        <line x1="10" y1="82" x2="80" y2="82" stroke="#D6D3D1" stroke-width="3" stroke-linecap="round"/>
        <line x1="10" y1="92" x2="100" y2="92" stroke="#D6D3D1" stroke-width="3" stroke-linecap="round"/>
        <line x1="10" y1="102" x2="70" y2="102" stroke="#D6D3D1" stroke-width="3" stroke-linecap="round"/>
        <!-- Stamp -->
        <rect x="10" y="116" width="50" height="14" rx="2" fill="#7FBC8C" stroke="#1C1917" stroke-width="2"/>
        <text x="35" y="126" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#1C1917">SELESAI</text>
      </g>
      <!-- Camera (foreground) -->
      <g transform="translate(150 80)">
        <rect x="4" y="14" width="100" height="74" rx="8" fill="#1C1917"/>
        <rect x="0" y="10" width="100" height="74" rx="8" fill="#FDFD96" stroke="#1C1917" stroke-width="3"/>
        <!-- Top hump -->
        <rect x="30" y="0" width="40" height="14" rx="3" fill="#FDFD96" stroke="#1C1917" stroke-width="3"/>
        <!-- Lens -->
        <circle cx="50" cy="48" r="22" fill="#1C1917"/>
        <circle cx="50" cy="48" r="18" fill="#7FBC8C" stroke="#1C1917" stroke-width="2.5"/>
        <circle cx="50" cy="48" r="9" fill="#1C1917"/>
        <circle cx="46" cy="44" r="3" fill="#FFFFFF"/>
        <!-- Flash -->
        <rect x="78" y="20" width="14" height="8" rx="2" fill="#FFFFFF" stroke="#1C1917" stroke-width="2"/>
        <!-- Shutter button -->
        <circle cx="84" cy="68" r="5" fill="#DC2626" stroke="#1C1917" stroke-width="2"/>
      </g>
      <!-- Flash sparkle -->
      <g transform="translate(232 56)" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-14"/>
        <line x1="-10" y1="6" x2="-20" y2="6"/>
        <line x1="-8" y1="-6" x2="-16" y2="-14"/>
      </g>
</svg>
