# Maestro flow: log in as a field worker (satgas) and screenshot each screen for
# the docs. Screenshots are written to ./shots/<name>.png (run from a work dir, or
# via capture-mobile-auto.sh which maps them onto fe/docs/static/img/mobile/).
#
#   maestro test fe/docs/scripts/maestro/capture.yaml
#
# Resilient by design: the welcome carousel, onboarding, and most navigation taps
# are optional, so the run captures whatever it can reach rather than aborting.
appId: com.wahyutrip.sekar
---
- launchApp:
    clearState: true
    permissions:
      all: allow
# Let the (cold) RN start + first carousel slide render on the software-GPU emulator.
- waitForAnimationToEnd:
    timeout: 9000

# ---------- Welcome carousel (pre-login, optional) — swipe through, enter login ----------
- runFlow:
    when:
      visible:
        id: "welcome-carousel-screen"
    commands:
      - repeat:
          times: 4
          commands:
            - swipe:
                direction: LEFT
            - waitForAnimationToEnd:
                timeout: 1200
      - extendedWaitUntil:
          visible:
            text: ".*Masuk.*"
          timeout: 10000
      - tapOn:
          text: ".*Masuk.*"
          optional: true
      - waitForAnimationToEnd:
          timeout: 2500

# ---------- Login screen ----------
- extendedWaitUntil:
    visible:
      id: "username-input"
    timeout: 60000
- takeScreenshot: shots/login
- tapOn:
    id: "username-input"
- inputText: "edi_santoso"
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard
- tapOn:
    id: "login-button"
- waitForAnimationToEnd:
    timeout: 5000

# ---------- Onboarding (only on first launch) ----------
- runFlow:
    when:
      visible:
        text: "Lanjut"
    commands:
      - tapOn:
          text: "Lanjut"
      - waitForAnimationToEnd:
          timeout: 1500
      - tapOn: { id: "perm-grant-notifications", optional: true }
      - tapOn: { id: "perm-grant-location", optional: true }
      - tapOn: { id: "perm-grant-background_location", optional: true }
      - tapOn: { id: "perm-grant-camera", optional: true }
      - tapOn: { id: "perm-grant-gallery", optional: true }
      - waitForAnimationToEnd:
          timeout: 1200
      - tapOn: { text: "Lanjut", optional: true }
      - waitForAnimationToEnd:
          timeout: 1500
      - tapOn: { text: "Mulai Bekerja", optional: true }
      - waitForAnimationToEnd:
          timeout: 3000

# ---------- Home (Beranda) ----------
- extendedWaitUntil:
    visible:
      text: "Beranda"
    timeout: 25000
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/home

# Unified Home · Menu · Profil navigation (current build): the Menu tab launches a
# tile grid (menu-<Route>-<Label> testIDs); deep links cover the clock-in screen.

# ---------- Notifications (bell in header) ----------
- tapOn:
    id: "notification-bell"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/notifikasi
- back
- waitForAnimationToEnd:
    timeout: 1500

# ---------- Menu launcher (Menu tab) ----------
- tapOn:
    text: "Menu"
    optional: true
- waitForAnimationToEnd:
    timeout: 1800
- takeScreenshot: shots/menu

# ---------- Kehadiran (Menu tile) ----------
- tapOn:
    id: "menu-Attendance-Kehadiran"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/kehadiran
- back
- waitForAnimationToEnd:
    timeout: 1500

# ---------- Tugas (Menu tile) ----------
- tapOn:
    id: "menu-Tasks-Tugas"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/tugas-list
# Detail — only if at least one task card exists (avoids screenshotting an empty list).
- runFlow:
    when:
      visible:
        id: "task-card"
    commands:
      - tapOn:
          id: "task-card"
          index: 0
      - waitForAnimationToEnd:
          timeout: 2500
      - takeScreenshot: shots/tugas-detail
      - back
      - waitForAnimationToEnd:
          timeout: 1500
- back
- waitForAnimationToEnd:
    timeout: 1500

# ---------- Aktivitas / Lapor Kerja (Menu tile) ----------
- tapOn:
    id: "menu-Activities-Aktivitas"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/lapor-kerja
- back
- waitForAnimationToEnd:
    timeout: 1500

# ---------- Lembur (Menu tile) ----------
- tapOn:
    id: "menu-Lembur-Lembur"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/lembur
- back
- waitForAnimationToEnd:
    timeout: 1500

# ---------- Profil (bottom tab) ----------
- tapOn:
    text: "Profil"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: shots/profil

# ---------- Jadwal Shift (Profil → Riwayat Shift; field-only menu item) ----------
- runFlow:
    when:
      visible:
        id: "shift-history-button"
    commands:
      - tapOn:
          id: "shift-history-button"
      - waitForAnimationToEnd:
          timeout: 2500
      - takeScreenshot: shots/jadwal
      - back
      - waitForAnimationToEnd:
          timeout: 1500

# ---------- Absen (clock in/out) via deep link — last, back behaviour varies ----------
- openLink: "sekar://absensi"
- waitForAnimationToEnd:
    timeout: 3500
- takeScreenshot: shots/absen-masuk
- swipe:
    direction: UP
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: shots/gps

# ---------- Foto Verifikasi (expand the "Foto Selfie" card; shows the Ambil Selfie CTA) ----------
- scrollUntilVisible:
    element:
      text: "Foto Selfie"
    direction: DOWN
    timeout: 6000
    optional: true
- tapOn:
    text: "Foto Selfie"
    optional: true
- waitForAnimationToEnd:
    timeout: 1800
- takeScreenshot: shots/absen-foto
