appId: com.wahyutrip.sekar
---
# 18-analytics-worker.yaml
# Worker (individual) analytics flow — field worker opens own performance dashboard
# Scenario: satgas/linmas logs in, opens "Kinerja" (WorkerAnalytics) tab,
#          views own performance score, KPIs, attendance trend, task progress
#
# AUTHOR'S NOTE: Authored against real screen selectors (visible text + NBText patterns)
# but NOT YET DEVICE-VERIFIED. No testIDs found in analytics screens; all selectors use
# visible text (Indonesian labels). Analytics cards are rendered via PerformanceScoreCard,
# KPIPills, TaskProgressCard, BarChart components. Exact UI structure requires on-device validation.

- launchApp
- assertVisible:
    text: Masuk|Login

# Login as satgas1 (field worker with Kinerja tab)
- tapOn:
    id: username-input
- inputText: satgas1

- tapOn:
    id: password-input
- inputText: password123

- tapOn:
    id: login-button

- wait: 2000

# Should be at FieldHomeScreen (Beranda)
- assertVisible:
    text: Beranda

- wait: 1000

# Navigate to WorkerAnalytics tab by tapping the "Kinerja" tab label
# scroll down to see bottom tabs if needed
- scroll:
    direction: down
    duration: 500

- wait: 500

# Tap WorkerAnalytics tab (label: "Kinerja" for satgas)
- tryTapOn:
    text: Kinerja

- wait: 1500

# Should be at WorkerAnalyticsScreen
- assertVisible:
    text: Kinerja Saya|Kinerja|Performance

- wait: 1000

# Verify key analytics elements are visible
# Expected visible elements:
# - Performance score card (numeric score, e.g., "85/100")
# - KPI pills (card-like metrics)
# - Task progress card
# - 7-day attendance trend (bar chart)

- assertVisible:
    text: Saya|Performance|Score

- wait: 500

# Scroll down to view all analytics sections
- scroll:
    direction: down
    duration: 500

- wait: 500

# Verify we see KPI pills or metric cards
- assertVisible:
    text: KPI|Kehadiran|Tugas|Performance|Attendance

- wait: 500

# Continue scrolling to see task progress section
- scroll:
    direction: down
    duration: 500

- wait: 500

# Look for task progress or trend data
- assertVisible:
    text: Tugas|Task|Tren|Trend|7 Hari

- wait: 500

# Tap refresh (pull-to-refresh or explicit refresh button) to test data reload
- scroll:
    direction: up
    duration: 500

- wait: 500

# Perform pull-to-refresh gesture (if available)
- tryTapOn:
    text: Refresh|Segarkan

- wait: 2000

# MANUAL: On-device, verify that:
# 1. Performance score displays correctly (numeric, with visual indicator/gauge)
# 2. KPIs show relevant metrics (attendance rate, tasks completed, etc.)
# 3. Task progress section shows a summary or detailed breakdown
# 4. 7-day attendance trend displays as a bar chart (Monday-Sunday)
# 5. Refresh loads fresh data from backend
# 6. All text is properly localized to Indonesian
